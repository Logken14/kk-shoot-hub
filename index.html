<script>
/* ══ JSONBIN CONFIG ══ */
const JURL = 'https://api.jsonbin.io/v3/b/69dc793636566621a8a8d894';
const JKEY = '$2a$10$1yy30T2h/Pm27AntO7ZOPuTqxf3Pp.jHQq9uGsPvv5LI/2ydrLqBi';

let shotDone = new Set();
let editDone = new Set();

/* ══ LOAD from JSONbin → fallback to localStorage ══ */
async function loadProgress() {
  try {
    const r = await fetch(JURL, { headers: { 'X-Master-Key': JKEY } });
    if (!r.ok) throw new Error('Fetch failed: ' + r.status);
    const j = await r.json();
    const record = j.record || {};
    shotDone = new Set(record.done || []);
    editDone = new Set(record.edited || []);
    // Mirror to localStorage as cache
    try {
      localStorage.setItem('kk-done', JSON.stringify([...shotDone]));
      localStorage.setItem('kk-edited', JSON.stringify([...editDone]));
    } catch (e) {}
    applyStates();
    updateProgress();
    updateDayHeaders();
  } catch (e) {
    console.warn('JSONbin load failed, using localStorage:', e);
    try {
      const s = localStorage.getItem('kk-done');
      shotDone = new Set(s ? JSON.parse(s) : []);
      const ed = localStorage.getItem('kk-edited');
      editDone = new Set(ed ? JSON.parse(ed) : []);
    } catch (e2) {
      shotDone = new Set();
      editDone = new Set();
    }
    applyStates();
    updateProgress();
    updateDayHeaders();
    showToast('⚠️ Offline — showing cached data');
  }
}

/* ══ SAVE to JSONbin + localStorage ══ */
async function saveProgress() {
  // editDone items are a subset of shotDone — store them separately
  const done = [...shotDone];
  const edited = [...editDone];
  try {
    localStorage.setItem('kk-done', JSON.stringify(done));
    localStorage.setItem('kk-edited', JSON.stringify(edited));
  } catch (e) {}
  const r = await fetch(JURL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JKEY },
    body: JSON.stringify({ done, edited })
  });
  if (!r.ok) throw new Error('Save failed: ' + r.status);
  return r.json();
}

/* ══ MANUAL BUTTONS ══ */
async function manualSync() {
  const b = document.getElementById('sync-btn');
  b.textContent = '⏳'; b.disabled = true;
  try {
    await saveProgress();
    showToast('✅ Synced to cloud!');
  } catch (e) {
    showToast('❌ Sync failed — saved locally');
  }
  b.textContent = '☁'; b.disabled = false;
}

async function manualLoad() {
  const b = document.getElementById('load-btn');
  b.textContent = '⏳'; b.disabled = true;
  try {
    await loadProgress();
    showToast('✅ Latest data loaded!');
  } catch (e) {
    showToast('❌ Load failed');
  }
  b.textContent = '↓'; b.disabled = false;
}

/* ══ TOAST ══ */
function showToast(msg) {
  let t = document.getElementById('kk-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'kk-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#141210;color:#fff;padding:12px 20px;border-radius:10px;font-family:Syne,sans-serif;font-size:13px;font-weight:700;z-index:9999;letter-spacing:0.05em;box-shadow:0 4px 20px rgba(0,0,0,0.4);transition:opacity 0.3s;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.opacity = '0', 3000);
}

/* ══ APPLY VISUAL STATES ══ */
function applyStates() {
  document.querySelectorAll('.episode').forEach(ep => {
    const id = ep.id;
    const isEdited = editDone.has(id);
    const isShot = shotDone.has(id) && !isEdited;
    ep.classList.toggle('shot-done', isShot);
    ep.classList.toggle('edit-done', isEdited);
  });
}

/* ══ MARK SHOT (green checkbox) ══ */
function markShot(ep) {
  const id = ep.id;
  if (editDone.has(id)) {
    // Already fully done — clicking shot rolls back everything
    editDone.delete(id);
    shotDone.delete(id);
  } else if (shotDone.has(id)) {
    // Shot but not edited — unmark shot
    shotDone.delete(id);
  } else {
    // Not started — mark as shot
    shotDone.add(id);
  }
  applyStates();
  updateProgress();
  updateDayHeaders();
  saveProgress();
}

/* ══ MARK EDITED (orange checkbox) ══ */
function markEdited(ep) {
  const id = ep.id;
  if (editDone.has(id)) {
    // Already edited — unmark edit only (keep shot)
    editDone.delete(id);
  } else {
    // Mark as both shot and edited
    shotDone.add(id);
    editDone.add(id);
  }
  applyStates();
  updateProgress();
  updateDayHeaders();
  saveProgress();
}

/* ══ PROGRESS COUNTS (fixed — no double-counting) ══ */
const TOTAL = 31;
function updateProgress() {
  // shotDone includes everything filmed (whether edited or not)
  const shotCount = shotDone.size;
  const editCount = editDone.size;
  const pct = (editCount / TOTAL) * 100;

  const fill = document.getElementById('shoot-prog-fill');
  if (fill) fill.style.width = pct + '%';

  const shotEl = document.getElementById('shot-count');
  const editEl = document.getElementById('edit-count');
  if (shotEl) shotEl.textContent = shotCount;
  if (editEl) editEl.textContent = editCount;

  // Top progress bar = edit completion (NOT scroll — see scroll handler below)
  // We store the edit % so the scroll handler doesn't overwrite it permanently
  window._editPct = pct;
}

/* ══ DAY TAB INDICATORS ══ */
const DAY_EPS = {
  1: ['ep1','ep7','ep8','ep14','ep18','ep23','ep25','ep29','ep31'],
  2: ['ep1b','ep2','ep4','ep19','ep26'],
  3: ['ep3','ep6','ep10','ep12','ep15','ep17','ep20','ep22'],
  4: ['ep5','ep9','ep11','ep13','ep16','ep21','ep24','ep27','ep28'],
  5: ['ep30','broll','buffer']
};

function updateDayHeaders() {
  document.querySelectorAll('.day-tab').forEach((t, i) => {
    const eps = DAY_EPS[i + 1] || [];
    const allShot = eps.length > 0 && eps.every(id => shotDone.has(id) || editDone.has(id));
    const allEdited = eps.length > 0 && eps.every(id => editDone.has(id));
    t.classList.toggle('day-edited', allEdited);
    t.classList.toggle('day-shot', allShot && !allEdited);
    // Store original label once
    if (!t.dataset.label) t.dataset.label = t.textContent.trim();
    const base = t.dataset.label.replace(/ [✓✂]$/, '');
    t.dataset.label = base;
    t.textContent = allEdited ? base + ' ✂' : allShot ? base + ' ✓' : base;
  });
}

/* ══ LANGUAGE ══ */
function setLang(lang) {
  document.body.className = 'lang-' + lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active',
      (lang === 'en' && b.title === 'English') ||
      (lang === 'ja' && b.title === '日本語')
    );
  });
  try { localStorage.setItem('kk-lang', lang); } catch (e) {}
}

/* ══ DAY TABS ══ */
function showDay(n) {
  document.querySelectorAll('.day-section').forEach((s, i) => s.classList.toggle('active', i === n - 1));
  document.querySelectorAll('.day-tab').forEach((t, i) => t.classList.toggle('active', i === n - 1));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ══ EPISODE ACCORDION ══ */
function tog(hdr) { hdr.parentElement.classList.toggle('open'); }

/* ══ SCROLL → top progress bar (won't overwrite edit %) ══ */
window.addEventListener('scroll', () => {
  const d = document.documentElement;
  const scrollPct = (d.scrollTop / (d.scrollHeight - d.clientHeight)) * 100;
  // Use whichever is higher — keeps edit progress visible on short pages
  const display = Math.max(scrollPct, window._editPct || 0);
  document.getElementById('prog').style.width = display + '%';
});

/* ══ EP PILL SMOOTH SCROLL ══ */
document.querySelectorAll('.ep-pill').forEach(p => {
  p.addEventListener('click', e => {
    e.preventDefault();
    const target = document.querySelector(p.getAttribute('href'));
    if (target) {
      target.scrollIntoView({ behavior: 'smooth' });
      if (!target.classList.contains('open')) target.classList.add('open');
    }
  });
});

/* ══ INIT ══ */
try { const s = localStorage.getItem('kk-lang'); if (s) setLang(s); } catch (e) {}
loadProgress();
</script>
