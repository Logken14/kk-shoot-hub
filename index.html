<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kawanishi Kaban — Shoot Scripts · All Days</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* KEEPING YOUR ORIGINAL STYLES + ADDITIONS */
:root {
  --task: #c8860a;
}
.task-progress {
  background: var(--header-bg);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 6px 16px;
  display: flex; align-items: center; gap: 10px;
}
.task-label { font-size: 11px; font-weight: 700; color: #c8860a; }
</style>
</head>
<body class="lang-en">

<!-- KEEP YOUR ORIGINAL HEADER + PROGRESS -->

<div class="day-tabs">
  <button class="day-tab active" onclick="showDay(1)">Day 1 · Apr 12</button>
  <button class="day-tab" onclick="showDay(2)">Day 2 · Apr 13</button>
  <button class="day-tab" onclick="showDay(3)">Day 3 · Apr 14</button>
  <button class="day-tab" onclick="showDay(4)">Day 4 · Apr 20</button>
  <button class="day-tab" onclick="showDay(5)">Day 5 · Apr 22</button>
  <button class="day-tab" onclick="showDay(6)">Apr 15 · Tasks</button>
</div>

<!-- TASK DAY -->
<div class="day-section" id="day6">
  <div class="day-intro">
    <div class="status-banner pending">
      <span class="sb-title">📋 April 15 — Today's Work</span>
    </div>

    <h2>Today's Tasks</h2>
  </div>

  <div class="task-progress">
    <div class="progress-track"><div class="progress-track-fill" id="task-fill"></div></div>
    <div class="task-label"><span id="task-count">0</span> / 3 done</div>
  </div>

  <div class="episode" id="task1">
    <div class="ep-header" onclick="tog(this)">
      <div class="ep-num">Task 01</div>
      <div class="ep-title-text">Write Report</div>
      <span class="ep-toggle">▾</span>
      <div class="ep-check" onclick="event.stopPropagation(); markDone(this.parentElement.parentElement);"></div>
    </div>
  </div>

  <div class="episode" id="task2">
    <div class="ep-header" onclick="tog(this)">
      <div class="ep-num">Task 02</div>
      <div class="ep-title-text">Edit Short Form Content</div>
      <span class="ep-toggle">▾</span>
      <div class="ep-check" onclick="event.stopPropagation(); markDone(this.parentElement.parentElement);"></div>
    </div>
  </div>

  <div class="episode" id="task3">
    <div class="ep-header" onclick="tog(this)">
      <div class="ep-num">Task 03</div>
      <div class="ep-title-text">Edit Sakura Video</div>
      <span class="ep-toggle">▾</span>
      <div class="ep-check" onclick="event.stopPropagation(); markDone(this.parentElement.parentElement);"></div>
    </div>
  </div>
</div>

<script>
// ADD TASK SUPPORT
const TASK_IDS = ['task1','task2','task3'];

function updateTaskProgress() {
  const doneTasks = TASK_IDS.filter(id => syncedDone.has(id)).length;
  const fill = document.getElementById('task-fill');
  const count = document.getElementById('task-count');
  if (fill) fill.style.width = (doneTasks / TASK_IDS.length * 100) + '%';
  if (count) count.textContent = doneTasks;
}

// MODIFY EXISTING FUNCTION
const originalUpdateProgress = updateProgress;
updateProgress = function() {
  originalUpdateProgress();
  updateTaskProgress();
}

// AUTO OPEN TODAY TAB
function autoOpenToday() {
  const today = new Date();
  if (today.getDate() === 15) showDay(6);
}

autoOpenToday();
</script>

</body>
</html>
